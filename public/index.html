<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:'#0d0f13',surface:'#13161c',surface2:'#1a1e27',
            border:'#252a36',text:'#c8cdd8',muted:'#5a6070',
            accent:'#4f8ef7',ok:'#3ecf8e',danger:'#f7604f',
          },
          fontFamily: {
            mono:['"JetBrains Mono"','monospace'],
            sans:['"IBM Plex Sans"','sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* ── DARK THEME (default) ── */
    :root {
      --bg:#0d0f13;--surface:#13161c;--surface2:#1a1e27;
      --border:#252a36;--text:#c8cdd8;--muted:#5a6070;
      --accent:#4f8ef7;--green:#3ecf8e;--red:#f7604f;
      --mono:'JetBrains Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
    }

    /* ── LIGHT THEME ── */
    html.light {
      --bg:#f0f2f5;--surface:#ffffff;--surface2:#e8eaed;
      --border:#d1d5db;--text:#1f2937;--muted:#6b7280;
      --accent:#2563eb;--green:#059669;--red:#dc2626;
    }

    /* CSS variables own all backgrounds — !important beats Tailwind utility classes */
    html, body      { background: var(--bg) !important; color: var(--text) !important; }
    #ticker         { background: var(--surface) !important; }
    #nav            { background: var(--bg) !important; }

    html,body{font-family:var(--mono);font-size:14px;line-height:1.5;transition:background .2s,color .2s;}

    /* ── APP LOADER ── */
    #app-loader{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease-in-out;}
    #app-loader.fade-out{opacity:0;pointer-events:none;}
    #app-loader.hidden{display:none;}
    #loader-bg{position:absolute;inset:0;background-image:url('/bg.jpg');background-size:cover;background-position:center;opacity:.3;}
    #loader-gradient{position:absolute;inset:0;background:linear-gradient(to right,rgba(71,85,105,.5),rgba(71,85,105,.8),transparent);}
    #loader-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 1.5rem;opacity:0;transform:translateY(12px);transition:opacity .6s ease-out,transform .6s ease-out;}
    #loader-content.visible{opacity:1;transform:translateY(0);}
    #loader-title{font-size:clamp(2.2rem,8vw,4rem);font-weight:900;color:#fff;letter-spacing:-.02em;font-style:italic;text-transform:uppercase;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8));line-height:1.05;}
    #loader-title span{color:#ef4444;}
    #loader-subtitle{margin-top:.75rem;font-size:clamp(.6rem,2vw,.75rem);font-family:var(--mono);color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.5em;opacity:0;transition:opacity .6s ease-out .15s;}
    #loader-subtitle.visible{opacity:1;}
    #loader-status{margin-top:1.5rem;font-family:var(--mono);font-size:.7rem;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.2em;min-height:1.2em;opacity:0;transition:opacity .4s ease-out .3s;}
    #loader-status.visible{opacity:1;}
    #loader-dots{display:inline-block;width:24px;text-align:left;}
    @keyframes loader-dots{0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'}}
    #loader-dots::after{content:'.';animation:loader-dots 1.2s steps(1) infinite}

    /* ── APP CONTENT ── */
    #app-content{opacity:0;transition:opacity 1s ease-in-out;}
    #app-content.visible{opacity:1;}

    /* ── TICKER ── */
    .ticker-name{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
    .ticker-price{font-family:var(--mono);font-size:13px;font-weight:500;}
    .ticker-change{font-family:var(--mono);font-size:11px;}
    .up{color:var(--green);}.down{color:var(--red);}

    /* ── CARD ── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:background .2s,border-color .2s;}
    .card-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .card-title{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);}
    .card-body{padding:14px;}

    /* ── MISC ── */
    .loading{color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px 0;}
    .pulse{animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .nav-btn.active{color:var(--text);background:var(--surface2);border:1px solid var(--border);}

    /* ── BORDER COLOR ── */
    #ticker, #nav { border-color: var(--border) !important; }

    /* ── THEME TOGGLE ── */
    #theme-toggle{margin-left:auto;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:color .15s,background .15s,border-color .15s;user-select:none;}
    #theme-toggle:hover{color:var(--text);}
  </style>
</head>
<body class="font-mono min-h-screen">

  <!-- ══ APP LOADER ══ -->
  <div id="app-loader">
    <div id="loader-bg"></div>
    <div id="loader-gradient"></div>
    <div id="loader-content">
      <div id="loader-title">Robin <span>te Hofstee</span></div>
      <div id="loader-subtitle">Personal Dashboard</div>
      <div id="loader-status">Loading<span id="loader-dots"></span></div>
    </div>
  </div>

  <!-- ══ APP CONTENT ══ -->
  <div id="app-content">
    <div id="ticker" class="sticky top-0 z-50 flex items-center h-[38px] border-b overflow-hidden">
      <div id="ticker-label" class="shrink-0 px-3 md:px-4 h-full flex items-center font-mono text-[10px] uppercase tracking-widest text-muted border-r border-border">Markets</div>
      <div id="ticker-track" class="flex items-center gap-6 md:gap-8 px-4 md:px-6 overflow-x-auto [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
        <span class="loading pulse">loading…</span>
      </div>
    </div>
    <nav id="nav" class="sticky top-[38px] z-40 flex items-center h-[42px] border-b px-3 md:px-4 gap-1">
      <span class="font-mono text-xs font-medium text-accent tracking-wide mr-3 md:mr-4 shrink-0 uppercase">Dashboard</span>
      <div id="nav-tabs" class="flex items-center gap-1 overflow-x-auto [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"></div>
      <button id="theme-toggle" title="Toggle light/dark mode">☀ Light</button>
    </nav>
    <div id="pages-root" class="mb-24"></div>
  </div>

  <script>
  // ══ THEME ════════════════════════════════════════════════════════════════════
  (function () {
    const saved = localStorage.getItem('theme');
    if (saved === 'light') document.documentElement.classList.add('light');

    function applyTheme(isLight) {
      document.documentElement.classList.toggle('light', isLight);
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = isLight ? '☾ Dark' : '☀ Light';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const isLight = document.documentElement.classList.contains('light');
      const btn = document.getElementById('theme-toggle');
      if (btn) {
        btn.textContent = isLight ? '☾ Dark' : '☀ Light';
        btn.addEventListener('click', () => {
          applyTheme(!document.documentElement.classList.contains('light'));
        });
      }
    });
  })();

  // ══ APP LOADER ══════════════════════════════════════════════════════════════
  (function(){
    const loader  = document.getElementById('app-loader');
    const content= document.getElementById('app-content');
    const lc     = document.getElementById('loader-content');
    const sub    = document.getElementById('loader-subtitle');
    const status = document.getElementById('loader-status');

    setTimeout(() => lc.classList.add('visible'), 80);
    setTimeout(() => sub.classList.add('visible'), 200);
    setTimeout(() => status.classList.add('visible'), 300);

    window._loaderDone = () => {
      status.innerHTML = 'Ready';
      setTimeout(() => {
        loader.classList.add('fade-out');
        content.classList.add('visible');
        setTimeout(() => loader.classList.add('hidden'), 800);
      }, 400);
    };
  })();

  // ══ MyGlance — plugin host ═══════════════════════════════════════════════════
  const MyGlance = (() => {
    const _widgets     = {};
    const _stylesDone  = new Set();
    const _wsHandlers  = {};
    let   _marketsDef  = null;
    let   _marketsTimer = null;
    let   _ws          = null;
    let   _wsReconnect = null;

    function connectWS() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      _ws = new WebSocket(`${proto}//${location.host}/ws`);

      _ws.addEventListener("message", (e) => {
        try {
          const { event, data } = JSON.parse(e.data);
          if (_wsHandlers[event]) {
            _wsHandlers[event].forEach(fn => fn(data));
          }
        } catch {}
      });

      _ws.addEventListener("close", () => {
        _wsReconnect = setTimeout(connectWS, 3000);
      });

      _ws.addEventListener("error", () => {
        _ws.close();
      });
    }

    connectWS();

    return {
      _widgets,
      _marketsDef,
      onWsEvent(event, handler) {
        if (!_wsHandlers[event]) _wsHandlers[event] = [];
        _wsHandlers[event].push(handler);
      },

      registerWidget(name, def) {
        _widgets[name] = def;
        console.log(`Registered widget: ${name}`);
        if (def.css && !_stylesDone.has(name)) {
          const s = document.createElement("style");
          s.textContent = def.css;
          document.head.appendChild(s);
          _stylesDone.add(name);
        }
      },

      registerMarkets(def) {
        _marketsDef = def;
      },

      async startMarkets() {
        if (!_marketsDef) return;
        const run = async () => {
          const data = await _marketsDef.fetch().catch(() => null);
          _marketsDef.render(data);
        };
        await run();
        if (_marketsTimer) clearInterval(_marketsTimer);
        _marketsTimer = setInterval(run, _marketsDef.refresh || 60_000);
      },

      async mount(name, container) {
        const def = _widgets[name];
        console.log(`Mounting widget: ${name}, found: ${!!def}, available:`, Object.keys(_widgets));
        if (!def) {
          container.innerHTML = `<div class="card"><div class="card-body"><span class="loading">Unknown widget: ${name}</span></div></div>`;
          return;
        }
        const data = await def.fetch().catch(() => null);
        def.render.call(def, container, data);

        if (def.refresh > 0) {
          setInterval(async () => {
            const d = await def.fetch().catch(() => null);
            document.querySelectorAll(`[data-widget-type="${name}"]`).forEach(el => {
              def.render.call(def, el, d);
            });
          }, def.refresh);
        }
      },

      ensureCard(container, title) {
        let body = container.querySelector(".card-body");
        if (!body) {
          container.innerHTML = `<div class="card">
            <div class="card-header"><span class="card-title">${title}</span></div>
            <div class="card-body"><span class="loading pulse">loading…</span></div>
          </div>`;
          body = container.querySelector(".card-body");
        }
        return body;
      },

      patch(el, html) {
        if (el && el.innerHTML !== html) el.innerHTML = html;
      },

      timeAgo(d) {
        if (!d) return "";
        const s = (Date.now() - new Date(d)) / 1000;
        if (s < 60)    return `${Math.floor(s)}s ago`;
        if (s < 3600)  return `${Math.floor(s / 60)}m ago`;
        if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
        return `${Math.floor(s / 86400)}d ago`;
      },
    };
  })();

  // ══ Dynamic script loader ════════════════════════════════════════════════════
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src     = src;
      s.onload  = () => { console.log(`Loaded: ${src}`); resolve(); };
      s.onerror = (e) => { console.error(`Failed to load: ${src}`, e); resolve(); };
      document.head.appendChild(s);
    });
  }

  // ══ Page builder ════════════════════════════════════════════════════════════
  const $ = id => document.getElementById(id);
  const el = (tag, cls, html="") => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    e.innerHTML = html;
    return e;
  };

  async function buildPage(page) {
    const pageEl = el("div", "page hidden");
    pageEl.classList.add("px-3","py-3","md:px-4","md:py-4","mx-auto","max-w-[1600px]");

    const layout = page.layout || [];
    const leftWidgets  = layout.filter(w => w.position === "left");
    const rightWidgets = layout.filter(w => w.position === "right");
    const fullWidgets  = layout.filter(w => w.position === "full" || !w.position);

    const hasLeft  = leftWidgets.length > 0;
    const hasRight = rightWidgets.length > 0;
    const grid     = el("div","");

    if (!hasLeft && !hasRight) {
      grid.className = "max-w-lg mx-auto mt-8 md:mt-12 flex flex-col gap-4";
      for (const w of fullWidgets) {
        const wEl = el("div","");
        wEl.dataset.widgetType = w.type;
        grid.appendChild(wEl);
        await MyGlance.mount(w.type, wEl);
      }
    } else if (!hasLeft || !hasRight) {
      grid.className = "flex flex-col gap-4";
      for (const w of [...leftWidgets, ...rightWidgets, ...fullWidgets]) {
        const wEl = el("div","");
        wEl.dataset.widgetType = w.type;
        grid.appendChild(wEl);
        await MyGlance.mount(w.type, wEl);
      }
    } else {
      grid.className = "flex flex-col md:flex-row gap-4 items-start";
      const leftCol  = el("div","flex flex-col gap-4 min-w-0 md:w-[280px] shrink-0");
      const rightCol = el("div","flex flex-col gap-4 min-w-0 md:w-[280px] shrink-0");
      const centerCol = el("div","flex flex-col gap-4 min-w-0 flex-1");

      for (const w of leftWidgets) {
        const wEl = el("div","");
        wEl.dataset.widgetType = w.type;
        leftCol.appendChild(wEl);
        await MyGlance.mount(w.type, wEl);
      }
      for (const w of fullWidgets) {
        const wEl = el("div","");
        wEl.dataset.widgetType = w.type;
        centerCol.appendChild(wEl);
        await MyGlance.mount(w.type, wEl);
      }
      for (const w of rightWidgets) {
        const wEl = el("div","");
        wEl.dataset.widgetType = w.type;
        rightCol.appendChild(wEl);
        await MyGlance.mount(w.type, wEl);
      }

      grid.appendChild(leftCol);
      grid.appendChild(centerCol);
      grid.appendChild(rightCol);
    }

    pageEl.appendChild(grid);
    return pageEl;
  }

  // ══ Nav ══════════════════════════════════════════════════════════════════════
  let currentPage = 0;
  function switchPage(idx) {
    document.querySelectorAll(".page").forEach((p,i) => {
      p.classList.toggle("hidden", i !== idx);
      p.classList.toggle("block",  i === idx);
    });
    document.querySelectorAll(".nav-btn").forEach((b,i) => b.classList.toggle("active", i === idx));
    currentPage = idx;
  }

  // ══ Boot ═════════════════════════════════════════════════════════════════════
  (async () => {
    const status = document.getElementById('loader-status');
    const setStatus = (msg) => { if (status) status.innerHTML = msg + '<span id="loader-dots"></span>'; };

    setStatus('Connecting');
    const pluginNames = await fetch("/api/plugins").then(r => r.json());

    setStatus('Loading plugins');
    await Promise.all(pluginNames.map(name => loadScript(`/plugins/${name}/client.js`)));

    setStatus('Starting widgets');
    await MyGlance.startMarkets();

    setStatus('Building pages');
    const pages = await fetch("/api/pages").then(r => r.json());
    const root  = $("pages-root");
    const tabs  = $("nav-tabs");

    for (let i = 0; i < pages.length; i++) {
      const btn = document.createElement("button");
      btn.className = "nav-btn px-3 py-1 rounded font-mono text-[11px] uppercase tracking-wide cursor-pointer border-0 bg-transparent text-muted transition-all hover:text-text hover:bg-surface";
      btn.textContent = pages[i].name;
      btn.addEventListener("click", () => switchPage(i));
      tabs.appendChild(btn);
      root.appendChild(await buildPage(pages[i]));
    }

    switchPage(0);
    if (window._loaderDone) window._loaderDone();
  })();
  </script>
</body>
</html>
